<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrontGuard Agent — Live Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
    }
    header {
      border-bottom: 1px solid #1f1f1f;
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
    }
    h1 {
      margin: 0 0 0.5rem 0;
      font-size: 1.5rem;
      color: #4ade80;
      letter-spacing: 0.02em;
    }
    .subtitle { color: #888; font-size: 0.875rem; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }
    section {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 8px;
      padding: 1.5rem;
    }
    h2 {
      margin: 0 0 1rem 0;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
    }
    button {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.875rem;
      text-align: left;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover {
      background: #222;
      border-color: #ef4444;
      color: #ef4444;
    }
    button .label { color: #888; font-size: 0.75rem; margin-top: 0.25rem; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat {
      background: #0a0a0a;
      border: 1px solid #1f1f1f;
      border-radius: 6px;
      padding: 1rem;
      text-align: center;
    }
    .stat-value {
      font-size: 1.75rem;
      font-weight: bold;
      color: #4ade80;
    }
    .stat-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.25rem;
    }
    .log {
      background: #0a0a0a;
      border: 1px solid #1f1f1f;
      border-radius: 6px;
      padding: 1rem;
      height: 400px;
      overflow-y: auto;
      font-size: 0.75rem;
      line-height: 1.5;
    }
    .log-entry {
      padding: 0.5rem;
      margin-bottom: 0.25rem;
      border-left: 3px solid;
      background: #111;
    }
    .severity-low { border-color: #6b7280; }
    .severity-medium { border-color: #eab308; }
    .severity-high { border-color: #f97316; }
    .severity-critical { border-color: #ef4444; }
    .log-time { color: #555; }
    .log-type { color: #4ade80; font-weight: bold; }
    .log-details { color: #aaa; margin-top: 0.25rem; word-break: break-all; }
    .empty { color: #555; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <header>
    <h1>FrontGuard Agent — Live Demo</h1>
    <p class="subtitle">Runtime DOM, script, and network monitor. Trigger an attack to see detection in real time.</p>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-label">Events</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-critical">0</div>
      <div class="stat-label">Critical</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-high">0</div>
      <div class="stat-label">High</div>
    </div>
  </div>

  <div class="grid">
    <section>
      <h2>Simulate Attacks</h2>
      <button data-attack="inject-script">
        Inject External Script
        <div class="label">Adds &lt;script src="https://evil.example.com/payload.js"&gt;</div>
      </button>
      <button data-attack="inject-inline-script">
        Inject Inline Script
        <div class="label">Adds &lt;script&gt;alert(1)&lt;/script&gt;</div>
      </button>
      <button data-attack="inject-iframe">
        Inject Tracking Iframe
        <div class="label">Adds &lt;iframe src="https://tracker.example.com"&gt;</div>
      </button>
      <button data-attack="suspicious-attribute">
        Add onerror Handler
        <div class="label">Sets onerror="alert(1)" on an existing element</div>
      </button>
      <button data-attack="injected-container">
        Inject Container with Nested Script
        <div class="label">Adds a &lt;div&gt; containing a &lt;script&gt;</div>
      </button>
      <button data-attack="clear" style="margin-top: 1rem; border-color: #2a2a2a;">
        Clear Event Log
      </button>
    </section>

    <section>
      <h2>Event Log</h2>
      <div class="log" id="log">
        <div class="empty">No events yet — trigger an attack →</div>
      </div>
    </section>
  </div>

  <script type="module">
    import FrontGuard from '../dist/frontguard.es.js';

    const logEl = document.getElementById('log');
    const statTotal = document.getElementById('stat-total');
    const statCritical = document.getElementById('stat-critical');
    const statHigh = document.getElementById('stat-high');

    let counts = { total: 0, critical: 0, high: 0 };

    const agent = FrontGuard.init({
      scriptAllowlist: ['cdn.trusted.com'],
      onEvent: (event) => {
        // Clear "no events" placeholder
        if (counts.total === 0) logEl.innerHTML = '';

        counts.total++;
        if (event.severity === 'critical') counts.critical++;
        if (event.severity === 'high') counts.high++;
        statTotal.textContent = counts.total;
        statCritical.textContent = counts.critical;
        statHigh.textContent = counts.high;

        const time = new Date(event.timestamp).toLocaleTimeString();
        const entry = document.createElement('div');
        entry.className = `log-entry severity-${event.severity}`;
        entry.innerHTML = `
          <div><span class="log-time">${time}</span> · <span class="log-type">${event.type}</span> · ${event.severity.toUpperCase()}</div>
          <div class="log-details">${escapeHTML(JSON.stringify(event.details))}</div>
        `;
        logEl.prepend(entry);
      },
    });

    function escapeHTML(s) {
      return s.replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // Attack handlers
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-attack]');
      if (!btn) return;
      const attack = btn.dataset.attack;

      if (attack === 'inject-script') {
        const s = document.createElement('script');
        s.src = 'https://evil.example.com/payload.js';
        document.body.appendChild(s);
      } else if (attack === 'inject-inline-script') {
        const s = document.createElement('script');
        s.textContent = 'console.log("FrontGuard caught me");';
        document.body.appendChild(s);
      } else if (attack === 'inject-iframe') {
        const f = document.createElement('iframe');
        f.src = 'https://tracker.example.com';
        f.style.display = 'none';
        document.body.appendChild(f);
      } else if (attack === 'suspicious-attribute') {
        document.querySelector('h1').setAttribute('onerror', 'alert(1)');
      } else if (attack === 'injected-container') {
        const div = document.createElement('div');
        div.innerHTML = '<script src="https://malicious.example.com/x.js"></scr' + 'ipt>';
        document.body.appendChild(div);
      } else if (attack === 'clear') {
        counts = { total: 0, critical: 0, high: 0 };
        statTotal.textContent = '0';
        statCritical.textContent = '0';
        statHigh.textContent = '0';
        logEl.innerHTML = '<div class="empty">Cleared.</div>';
      }
    });
  </script>
</body>
</html>
