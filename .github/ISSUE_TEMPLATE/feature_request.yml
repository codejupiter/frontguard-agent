name: Feature request
description: Propose a new detection, telemetry, or integration feature.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What security visibility gap should this solve?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - DOM detection
        - Network monitoring
        - Telemetry/reporting
        - CSP integration
        - Package/API
        - Demo/docs
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: Performance, privacy, compatibility, or false-positive concerns.
